server {
    listen 80;                        # ポート80でリクエストを受け付ける
    server_name localhost;
    root /var/www/html/public;        # Laravelの公開ディレクトリ（public/index.phpが入口）

    index index.php index.html;

    location / {
        # URLに対応するファイルがなければindex.phpに渡す（Laravelのルーティング用）
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # PHPファイルはappコンテナ（PHP-FPM）の9000番ポートに転送する
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;                     # .htaccessへのアクセスを拒否（セキュリティ）
    }
}
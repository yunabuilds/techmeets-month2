services:
  # Nginx（Webサーバー）
  nginx:
    image: nginx:latest
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # PHP-FPM（アプリケーション）
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=db
      - DB_DATABASE=laravel
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - app-network

  # MySQL（データベース）
  db:
    image: mysql:8.0
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql   # MySQLのデータを「db-data」というボリュームに永続化
    networks:
      - app-network

  # phpMyAdmin（データベース管理ツール）
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: secret
    depends_on:
      - db
    networks:
      - app-network

# 永続化ボリューム（コンテナを削除してもDBのデータを残す）
volumes:
  db-data:

# 仮想ネットワーク（同じネットワーク内のコンテナはサービス名で通信できる）
networks:
  app-network:
    driver: bridge